name: Weekly Cutoff PR

on:
  schedule:
    - cron: '0 3 * * 0'  # Domingo às 03:00 UTC = meia-noite BRT (madrugada sáb→dom)
  workflow_dispatch:

jobs:
  create-cutoff-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for differences and existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin
          COUNT=$(git rev-list --count origin/main..origin/deploy)
          EXISTING=$(gh pr list --base main --head deploy --state open --json number --jq length)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "existing=$EXISTING" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.count > 0 && steps.check.outputs.existing == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head deploy \
            --title "🚀 Cutoff semanal — deploy → main" \
            --body "## Release semanal automático

          Este PR foi criado automaticamente pelo workflow de cutoff.

          - **Branch origem:** \`deploy\`
          - **Branch destino:** \`main\`
          - **Commits novos:** ${{ steps.check.outputs.count }}

          ⚠️ Revise e faça o merge manualmente quando estiver pronto.

          > Após o merge, o workflow de sincronização vai igualar \`deploy\` com \`main\` automaticamente." \
            --repo ${{ github.repository }}

      - name: PR already exists
        if: steps.check.outputs.existing != '0'
        run: echo "Já existe um PR aberto de deploy → main. Nenhum novo PR criado."

      - name: No changes to deploy
        if: steps.check.outputs.count == '0'
        run: echo "Nenhuma diferença entre deploy e main. PR não criado."
